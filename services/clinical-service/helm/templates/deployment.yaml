apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "clinical-service.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "clinical-service.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "clinical-service.selectorLabels" . | nindent 6 }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        {{- include "clinical-service.selectorLabels" . | nindent 8 }}
    spec:
      {{- if .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml .Values.nodeSelector | nindent 8 }}
      {{- end }}
      {{- if .Values.podAntiAffinity }}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - clinical-service
                topologyKey: kubernetes.io/hostname
      {{- end }}
      # ── Init Container: Wait for Postgres ──
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for Postgres..."
              until nc -z {{ .Values.env.DB_HOST }} {{ .Values.env.DB_PORT }}; do
                echo "Postgres not ready, retrying in 3s..."
                sleep 3
              done
              echo "Postgres is ready!"
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.targetPort }}
              protocol: TCP
          env:
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: {{ include "clinical-service.fullname" . }}-config
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: {{ include "clinical-service.fullname" . }}-config
                  key: DB_PORT
            - name: DB_DATABASE
              valueFrom:
                configMapKeyRef:
                  name: {{ include "clinical-service.fullname" . }}-config
                  key: DB_DATABASE
            - name: DB_USERNAME
              valueFrom:
                configMapKeyRef:
                  name: {{ include "clinical-service.fullname" . }}-config
                  key: DB_USERNAME
            - name: KAFKA_BROKER
              valueFrom:
                configMapKeyRef:
                  name: {{ include "clinical-service.fullname" . }}-config
                  key: KAFKA_BROKER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "clinical-service.fullname" . }}-secret
                  key: DB_PASSWORD
            - name: JAVA_OPTS
              value: "-Xms256m -Xmx512m"
          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      terminationGracePeriodSeconds: 30
