# ── RabbitMQ for MedTrust ──
---
apiVersion: v1
kind: Secret
metadata:
  name: medtrust-rabbitmq-secret
  namespace: medtrust
type: Opaque
data:
  # "medtrust" base64 encoded
  RABBITMQ_DEFAULT_USER: bWVkdHJ1c3Q=
  # "changeme" base64 encoded
  RABBITMQ_DEFAULT_PASS: Y2hhbmdlbWU=

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: medtrust-rabbitmq
  namespace: medtrust
  labels:
    app: medtrust-rabbitmq
spec:
  replicas: 1
  selector:
    matchLabels:
      app: medtrust-rabbitmq
  template:
    metadata:
      labels:
        app: medtrust-rabbitmq
    spec:
      containers:
        - name: rabbitmq
          image: rabbitmq:3-management
          ports:
            - containerPort: 5672
              name: amqp
            - containerPort: 15672
              name: management
          env:
            - name: RABBITMQ_DEFAULT_USER
              valueFrom:
                secretKeyRef:
                  name: medtrust-rabbitmq-secret
                  key: RABBITMQ_DEFAULT_USER
            - name: RABBITMQ_DEFAULT_PASS
              valueFrom:
                secretKeyRef:
                  name: medtrust-rabbitmq-secret
                  key: RABBITMQ_DEFAULT_PASS
          readinessProbe:
            exec:
              command:
                - rabbitmq-diagnostics
                - -q
                - ping
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 15
          livenessProbe:
            exec:
              command:
                - rabbitmq-diagnostics
                - -q
                - ping
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 15
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi

---
apiVersion: v1
kind: Service
metadata:
  name: medtrust-rabbitmq
  namespace: medtrust
  labels:
    app: medtrust-rabbitmq
spec:
  type: ClusterIP
  ports:
    - port: 5672
      targetPort: 5672
      protocol: TCP
      name: amqp
    - port: 15672
      targetPort: 15672
      protocol: TCP
      name: management
  selector:
    app: medtrust-rabbitmq
